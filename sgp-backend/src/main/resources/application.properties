# ---------------------------------------------------------
# CONFIGURAÇÃO DO BANCO DE DADOS LOCAL (MYSQL)
# ---------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/sgp_senai?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
# Coloque aqui a senha que você definiu na instalação do MySQL:
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# O Hibernate vai criar/atualizar as tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true