# ---------------------------------------------------------
# CONFIGURAÇÃO DO BANCO DE DADOS LOCAL (MYSQL)
# ---------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/sgp_senai?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---------------------------------------------------------
# CONFIGURAÇÕES DE SEGURANÇA (JWT E CORS) - ADICIONE ISTO:
# ---------------------------------------------------------
# Chave secreta para gerar os tokens de login (pode colocar qualquer texto complexo)
api.security.token.secret=senai-sgp-chave-super-secreta-123456789

# URL do seu frontend React para o backend permitir a conexão (CORS)
api.security.cors.allowed-origins=http://localhost:5173