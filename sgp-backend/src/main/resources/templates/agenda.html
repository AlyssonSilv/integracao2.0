<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Programação CTA - SENAI</title>
    <style>
        @page {
            size: A4 landscape;
            margin: 1cm;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 20px auto;
            border: 3px solid #0b2c5a;
            background: #fff;
        }

        .header-table {
            width: 100%;
            background: #1f3f6b;
            color: #fff;
            border-collapse: collapse;
        }

        .header-table td {
            padding: 10px 20px;
            vertical-align: middle;
        }

        .header-table h1 {
            font-size: 20px;
            margin: 0;
            text-align: center;
        }

        .logo-img {
            height: 50px;
            display: block;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .table th,
        .table td {
            border: 1px solid #333;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            word-wrap: break-word;
        }

        .table th {
            background: #2f4f77;
            color: #fff;
        }

        .left-date {
            background: #0b2c5a;
            color: #fff;
            width: 40px;
            vertical-align: middle;
            text-align: center;
            padding: 0 !important;
        }

        .vertical-container {
            width: 40px;
            height: 150px;
            position: relative;
            margin: 0 auto;
        }

        .texto-vertical {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-90deg);
            white-space: nowrap;
            font-weight: bold;
            text-transform: uppercase;
        }

        .row-blue {
            background: #b7c9d8;
        }

        .row-gray {
            background: #e5e5e5;
        }
    </style>
</head>

<body>

    <div class="container">

        <table class="header-table">
            <tr>
                <td style="width: 20%; text-align: left;">
                    <img src="logo-senai.png" alt="SENAI" class="logo-img" style="height: 75px;" />
                </td>
                <td style="width: 60%; text-align: center;">
                    <h1>PROGRAMAÇÃO CTA - SENAI</h1>
                </td>
                <td style="width: 20%; text-align: right;">
                    <img src="logo-alumar.png" alt="ALUMAR" class="logo-img" />
                </td>
            </tr>
        </table>

        <table class="table">
            <thead>
                <tr>
                    <th style="width: 45px;">DATA</th>
                    <th style="width: 25%;">TREINAMENTO</th>
                    <th style="width: 15%;">HORÁRIO</th>
                    <th style="width: 15%;">INSTRUTOR</th>
                    <th style="width: 10%;">SALA</th>
                    <th>EMPRESAS</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="sol, iterStat : ${solicitacoes}" th:class="${iterStat.even} ? 'row-blue' : 'row-gray'">

                    <td th:if="${iterStat.first}" class="left-date" th:rowspan="${#lists.size(solicitacoes)}">
                        <div class="vertical-container">
                            <div class="texto-vertical"
                                th:text="${sol.dataSugerida != null ? #temporals.format(sol.dataSugerida, 'dd/MM/yyyy') : '-'}">
                            </div>
                        </div>
                    </td>

                    <td><b th:text="${sol.treinamento}"></b></td>
                    <td th:text="${sol.horario}"></td>
                    <td th:text="${sol.instrutor}"></td>
                    <td th:text="${sol.sala}"></td>
                    <td th:text="${(sol.empresa != null ? sol.empresa.razaoSocial : '-') + ' (' + (sol.quantidadeParticipantes != null ? sol.quantidadeParticipantes : '0') + ')'}">
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(solicitacoes)}">
                    <td colspan="6" style="padding: 20px; font-weight: bold; background-color: #fff;">
                        Nenhum treinamento confirmado para esta data.
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

</body>

</html>
